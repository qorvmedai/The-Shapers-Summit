<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — The Shapers Summit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800&family=Archivo+Expanded:wght@700;800&display=swap" rel="stylesheet">
<script src="https://js.paystack.co/v1/inline.js"></script>

<style>
  :root{
    --black:#0a0908;
    --char:#141210;
    --panel:#1a1714;
    --line:rgba(245,241,232,0.12);
    --bone:#f5f1e8;
    --bone-dim:#b8b2a4;
    --orange:#ff7a1a;
    --orange-2:#ffb347;
    --red:#e01b22;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--black);
    color:var(--bone);
    font-family:'Archivo',sans-serif;
    overflow-x:hidden;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  ::selection{background:var(--orange);color:var(--black);}
  a{color:inherit;text-decoration:none;}

  .display{font-family:'Anton',sans-serif;font-weight:400;letter-spacing:0.01em;text-transform:uppercase;}
  .eyebrow{
    font-family:'Archivo Expanded',sans-serif;
    font-weight:700;
    letter-spacing:0.18em;
    text-transform:uppercase;
    font-size:0.72rem;
    color:var(--orange);
  }

  /* NAV */
  header{
    background:rgba(10,9,8,0.82);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
    padding:16px 28px;
  }
  .brand{display:flex;align-items:center;gap:10px;justify-content:center;}
  .brand-mark{
    width:36px;height:36px;background:var(--red);
    display:flex;align-items:center;justify-content:center;
    font-family:'Anton',sans-serif;font-size:1.1rem;color:var(--bone);
    flex-shrink:0;
  }
  .brand-text{font-family:'Archivo Expanded',sans-serif;font-weight:800;font-size:0.92rem;letter-spacing:0.02em;line-height:1.05;}
  .brand-text span{display:block;font-size:0.6rem;color:var(--orange);letter-spacing:0.16em;font-weight:700;}

  /* CHECKOUT WRAPPER */
  .checkout-wrap{
    max-width: 600px;
    margin: 60px auto;
    padding: 0 28px;
    flex: 1;
    width: 100%;
  }
  .checkout-header {
    text-align: center;
    margin-bottom: 40px;
  }
  .checkout-header h1 {
    font-size: clamp(2rem, 5vw, 3rem);
    margin-top: 10px;
  }

  /* SUMMARY CARD */
  .summary-card {
    background: var(--panel);
    border: 1px solid var(--orange);
    padding: 24px;
    margin-bottom: 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .summary-info h3 {
    font-family: 'Archivo Expanded', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 4px;
  }
  .summary-info p { color: var(--bone-dim); font-size: 0.9rem; }
  .summary-price {
    font-family: 'Anton', sans-serif;
    font-size: 2.2rem;
    color: var(--bone);
  }

  /* FORM */
  .form-group {
    margin-bottom: 24px;
  }
  .form-group label {
    display: block;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--bone-dim);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .form-control {
    width: 100%;
    background: var(--char);
    border: 1px solid var(--line);
    color: var(--bone);
    font-family: 'Archivo', sans-serif;
    padding: 16px 20px;
    font-size: 1rem;
    transition: border-color 0.2s;
    outline: none;
  }
  .form-control:focus {
    border-color: var(--orange);
  }
  .form-control::placeholder {
    color: rgba(245,241,232,0.3);
  }
  .error-msg {
    color: var(--red);
    font-size: 0.8rem;
    font-weight: 600;
    margin-top: 6px;
    display: none;
  }
  .has-error .form-control { border-color: var(--red); }
  .has-error .error-msg { display: block; }

  /* BUTTONS & MESSAGES */
  .btn-submit {
    width: 100%;
    background: var(--orange);
    color: var(--black);
    padding: 20px;
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: 0.02em;
    border: 1px solid var(--orange);
    cursor: pointer;
    transition: transform .18s ease, box-shadow .18s ease;
    font-family: 'Archivo', sans-serif;
    margin-top: 10px;
  }
  .btn-submit:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px -8px rgba(255,122,26,0.5);
  }
  .btn-submit:disabled {
    background: var(--line);
    border-color: var(--line);
    color: var(--bone-dim);
    cursor: not-allowed;
  }
  .sys-message {
    margin-top: 20px;
    padding: 16px;
    background: rgba(224,27,34,0.1);
    border: 1px solid var(--red);
    color: var(--bone);
    font-size: 0.9rem;
    text-align: center;
    display: none;
  }

  footer{padding:48px 0; border-top: 1px solid var(--line); margin-top: auto;}
  .footer-copy{color:var(--bone-dim);font-size:0.78rem;text-align:center;}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-mark">S</div>
    <div class="brand-text">THE SHAPERS<br>SUMMIT<span>IBADAN · 2026</span></div>
  </div>
</header>

<main class="checkout-wrap">
  <div class="checkout-header">
    <span class="eyebrow">Secure Your Seat</span>
    <h1 class="display">Complete <span style="color:var(--orange)">Registration</span></h1>
  </div>

  <div class="summary-card" id="summaryCard">
    <div class="summary-info">
      <h3 id="displayTierName">Loading...</h3>
      <p>The Shapers Summit 2026</p>
    </div>
    <div class="summary-price" id="displayTierPrice">₦0</div>
  </div>

  <form id="paymentForm">
    <div class="form-group" id="group-name">
      <label for="fullName">Full Name</label>
      <input type="text" id="fullName" class="form-control" placeholder="Jane Doe">
      <div class="error-msg">Please enter your full name.</div>
    </div>
    
    <div class="form-group" id="group-email">
      <label for="emailAddress">Email Address</label>
      <input type="email" id="emailAddress" class="form-control" placeholder="jane@example.com">
      <div class="error-msg">Please enter a valid email address.</div>
    </div>

    <div class="form-group" id="group-phone">
      <label for="phoneNumber">Phone Number</label>
      <input type="tel" id="phoneNumber" class="form-control" placeholder="08012345678">
      <div class="error-msg">Please enter a valid Nigerian phone number.</div>
    </div>

    <button type="submit" class="btn-submit" id="payBtn">Processing...</button>
    <div class="sys-message" id="sysMessage"></div>
  </form>
</main>

<footer>
  <div class="footer-copy">© 2026 The Shapers Summit, Ibadan. All rights reserved.</div>
</footer>

<script>
  // ==========================================
  // CONFIGURATION: SET PRICING & KEYS HERE
  // ==========================================
  
  // Replace this with your TEST key during dev, and LIVE key before launch.
  const PAYSTACK_PUBLIC_KEY = 'pk_test_cc157283d9cb367217a111b16d2fed3f5d4089b1'; 

  const TICKET_TIERS = {
    'early-bird': { name: 'Early Bird', price: 15000 },
    'regular': { name: 'Regular', price: 25000 },
    'vip': { name: 'VIP', price: 50000 }
  };

  // ==========================================
  // LOGIC
  // ==========================================
  let selectedTier = null;
  let ticketAmount = 0;

  // 1. Parse URL & Set State
  document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const tierKey = params.get('tier');

    if (tierKey && TICKET_TIERS[tierKey]) {
      selectedTier = TICKET_TIERS[tierKey];
      ticketAmount = selectedTier.price;
      
      document.getElementById('displayTierName').innerText = selectedTier.name;
      document.getElementById('displayTierPrice').innerText = '₦' + ticketAmount.toLocaleString();
      document.getElementById('payBtn').innerText = 'Pay ₦' + ticketAmount.toLocaleString();
    } else {
      // Handle invalid or missing tier parameter
      document.getElementById('summaryCard').style.display = 'none';
      document.getElementById('paymentForm').innerHTML = `
        <div style="text-align:center; padding:40px 0;">
            <p style="color:var(--bone-dim); margin-bottom:20px;">No ticket tier selected or invalid link.</p>
            <a href="index.html" class="btn-submit" style="display:inline-block; width:auto; padding:12px 24px;">Return to Homepage</a>
        </div>
      `;
    }
  });

  // 2. Validation Rules
  const isValidEmail = (email) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  // Matches 080..., 090..., 070..., +234... etc. (10-14 digits)
  const isValidPhone = (phone) => /^(?:\+?234|0)[789][01]\d{8}$/.test(phone.replace(/\s/g, ''));

  // 3. Handle Form Submission
  const form = document.getElementById('paymentForm');
  const sysMsg = document.getElementById('sysMessage');

  if(form) {
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      sysMsg.style.display = 'none';

      // Get values
      const name = document.getElementById('fullName').value.trim();
      const email = document.getElementById('emailAddress').value.trim();
      const phone = document.getElementById('phoneNumber').value.trim();

      // Reset errors
      document.getElementById('group-name').classList.remove('has-error');
      document.getElementById('group-email').classList.remove('has-error');
      document.getElementById('group-phone').classList.remove('has-error');

      let isValid = true;

      if (name.length < 2) {
        document.getElementById('group-name').classList.add('has-error');
        isValid = false;
      }
      if (!isValidEmail(email)) {
        document.getElementById('group-email').classList.add('has-error');
        isValid = false;
      }
      if (!isValidPhone(phone)) {
        document.getElementById('group-phone').classList.add('has-error');
        isValid = false;
      }

      if (isValid) {
        initializePaystack(name, email, phone);
      }
    });
  }

  // 4. Paystack Integration
  function initializePaystack(name, email, phone) {
    if(PAYSTACK_PUBLIC_KEY === 'PAYSTACK_PUBLIC_KEY_HERE') {
        alert("Developer Note: Please add your Paystack Public Key in the script configuration.");
        return;
    }

    const payBtn = document.getElementById('payBtn');
    payBtn.disabled = true;
    payBtn.innerText = 'Initializing...';

    // Amount must be in kobo (multiply Naira by 100)
    const amountInKobo = ticketAmount * 100;
    
    // Generate unique reference (for real production, a backend should ideally generate this)
    const ref = 'TSS_' + Math.floor((Math.random() * 1000000000) + 1);

    let handler = PaystackPop.setup({
      key: PAYSTACK_PUBLIC_KEY, 
      email: email,
      amount: amountInKobo,
      ref: ref,
      metadata: {
         custom_fields: [
            { display_name: "Full Name", variable_name: "full_name", value: name },
            { display_name: "Phone Number", variable_name: "phone_number", value: phone },
            { display_name: "Ticket Tier", variable_name: "ticket_tier", value: selectedTier.name }
         ]
      },
      callback: function(response){
        // Payment successful!
        // Redirect to success page with parameters
        const urlParams = new URLSearchParams({
            ref: response.reference,
            name: name,
            tier: selectedTier.name
        });
        window.location.href = "success.html?" + urlParams.toString();
      },
      onClose: function(){
        // Payment popup closed manually
        payBtn.disabled = false;
        payBtn.innerText = 'Pay ₦' + ticketAmount.toLocaleString();
        sysMsg.innerText = "Transaction was cancelled. Please try again.";
        sysMsg.style.display = 'block';
      }
    });

    handler.openIframe();
  }
</script>

</body>
</html>
